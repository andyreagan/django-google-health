<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sign in — django-google-health demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 24rem; margin: 4rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; }
    input[type=text], input[type=password] { width: 100%; padding: 0.5rem; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    .error { color: #b00; }
  </style>
</head>
<body>
  <h1>Sign in</h1>
  <p>Use the username + password you set with <code>createsuperuser</code>.</p>
  {% if form.non_field_errors %}<p class="error">{{ form.non_field_errors }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>
      Username
      {{ form.username }}
    </label>
    <label>
      Password
      {{ form.password }}
    </label>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
